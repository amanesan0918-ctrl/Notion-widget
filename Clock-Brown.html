<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Widget - Brown</title>
<style>
  :root {
    --cream: #FBF4EA;
    --cream-deep: #F3E7D6;
    --brown-deep: #6B4A38;
    --brown: #8B6650;
    --brown-soft: #A9876F;
    --brown-faint: #D9C5B2;
    --line: #E8D9C6;
    --rose: #C97B6B;
    --sage: #93A584;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
    color: var(--brown-deep);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12px;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: linear-gradient(160deg, var(--cream) 0%, var(--cream-deep) 100%);
    border-radius: 20px;
    padding: 30px 28px 26px;
    box-shadow: 0 1px 2px rgba(139, 102, 80, 0.10), 0 12px 28px rgba(139, 102, 80, 0.14);
    border: 1px solid var(--line);
    text-align: center;
    overflow: hidden;
  }

  .sprig {
    position: absolute;
    top: -6px;
    right: -8px;
    width: 92px;
    height: 92px;
    opacity: 0.85;
    pointer-events: none;
  }

  .sprig-left {
    position: absolute;
    bottom: -10px;
    left: -14px;
    width: 76px;
    height: 76px;
    opacity: 0.55;
    pointer-events: none;
    transform: scaleX(-1) rotate(8deg);
  }

  .ribbon {
    width: 34px;
    height: 2px;
    border-radius: 2px;
    background: var(--brown-soft);
    margin: 0 auto 20px;
    position: relative;
    z-index: 1;
  }

  .time {
    font-size: 54px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--brown-deep);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 3px;
    position: relative;
    z-index: 1;
  }

  .time .colon {
    display: inline-block;
    color: var(--brown-soft);
    transition: opacity 0.2s ease;
  }

  .time .colon.dim {
    opacity: 0.25;
  }

  .seconds {
    font-size: 21px;
    font-weight: 600;
    color: var(--brown-faint);
    margin-left: 8px;
    align-self: flex-end;
    padding-bottom: 6px;
    min-width: 30px;
    text-align: left;
  }

  .date-row {
    margin-top: 16px;
    font-size: 16px;
    font-weight: 600;
    color: var(--brown);
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }

  .date-row .weekday {
    color: var(--brown-soft);
  }

  .date-row.holiday .weekday,
  .date-row.sunday .weekday {
    color: var(--rose);
  }

  .date-row.saturday .weekday {
    color: var(--sage);
  }

  .holiday-name {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--rose);
    letter-spacing: 0.5px;
    height: 15px;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 360px) {
    .card { padding: 22px 18px 18px; }
    .time { font-size: 38px; }
    .seconds { font-size: 17px; }
    .date-row { font-size: 13px; }
    .sprig { width: 66px; height: 66px; }
    .sprig-left { width: 54px; height: 54px; }
  }
</style>
</head>
<body>

<div class="card">
  <svg class="sprig" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M85 5 C75 20, 65 30, 55 45 C50 53, 48 60, 50 68" fill="none" stroke="#A9876F" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M70 18 C66 22, 60 25, 56 30" fill="none" stroke="#A9876F" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M62 32 C58 35, 53 37, 49 41" fill="none" stroke="#A9876F" stroke-width="1.1" stroke-linecap="round"/>
    <g fill="#E8DCC8" stroke="#D9C5B2" stroke-width="0.6">
      <circle cx="85" cy="6" r="4.2"/>
      <circle cx="79" cy="10" r="3.4"/>
      <circle cx="90" cy="12" r="3.6"/>
      <circle cx="72" cy="17" r="3.6"/>
      <circle cx="65" cy="23" r="3.1"/>
      <circle cx="58" cy="29" r="3.3"/>
      <circle cx="52" cy="38" r="2.6"/>
      <circle cx="46" cy="42" r="2.2"/>
    </g>
    <g fill="#C97B6B" opacity="0.5">
      <circle cx="85" cy="6" r="1.1"/>
      <circle cx="72" cy="17" r="0.9"/>
      <circle cx="58" cy="29" r="0.9"/>
    </g>
  </svg>

  <svg class="sprig-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M85 5 C75 20, 65 30, 55 45 C50 53, 48 60, 50 68" fill="none" stroke="#A9876F" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M70 18 C66 22, 60 25, 56 30" fill="none" stroke="#A9876F" stroke-width="1" stroke-linecap="round"/>
    <g fill="#E8DCC8" stroke="#D9C5B2" stroke-width="0.5">
      <circle cx="85" cy="6" r="3.6"/>
      <circle cx="79" cy="10" r="2.9"/>
      <circle cx="72" cy="17" r="3"/>
      <circle cx="65" cy="23" r="2.6"/>
      <circle cx="58" cy="29" r="2.7"/>
    </g>
  </svg>

  <div class="ribbon"></div>
  <div class="time" id="timeDisplay">
    <span id="hours">--</span><span class="colon" id="colon">:</span><span id="minutes">--</span><span class="seconds" id="seconds">--</span>
  </div>
  <div class="date-row" id="dateRow">
    <span id="dateText">----/--/--</span> <span class="weekday" id="weekdayText">-</span>
  </div>
  <div class="holiday-name" id="holidayName"></div>
</div>

<script>
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const colonEl = document.getElementById('colon');
  const dateRowEl = document.getElementById('dateRow');
  const dateTextEl = document.getElementById('dateText');
  const weekdayTextEl = document.getElementById('weekdayText');
  const holidayNameEl = document.getElementById('holidayName');

  const weekdayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  // --- 日本の祝日判定ロジック（カレンダーウィジェットと共通） ---

  function vernalEquinoxDay(year) {
    return Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  }
  function autumnalEquinoxDay(year) {
    return Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  }
  function nthWeekday(year, month, weekday, n) {
    const firstDay = new Date(year, month, 1).getDay();
    let date = 1 + ((weekday - firstDay + 7) % 7) + (n - 1) * 7;
    return date;
  }

  function getHolidays(year) {
    const holidays = {};
    const add = (month, date, name) => {
      holidays[`${month}-${date}`] = name;
    };

    add(1, 1, '元日');
    add(1, nthWeekday(year, 0, 1, 2), '成人の日');
    add(2, 11, '建国記念の日');
    if (year >= 2020) add(2, 23, '天皇誕生日');
    add(3, vernalEquinoxDay(year), '春分の日');
    add(4, 29, '昭和の日');
    add(5, 3, '憲法記念日');
    add(5, 4, 'みどりの日');
    add(5, 5, 'こどもの日');
    add(7, nthWeekday(year, 6, 1, 3), '海の日');
    if (year >= 2016) add(8, 11, '山の日');
    add(9, nthWeekday(year, 8, 1, 3), '敬老の日');
    add(9, autumnalEquinoxDay(year), '秋分の日');
    add(10, nthWeekday(year, 9, 1, 2), 'スポーツの日');
    add(11, 3, '文化の日');
    add(11, 23, '勤労感謝の日');

    // 国民の休日
    const baseEntries = Object.entries(holidays);
    baseEntries.forEach(([key]) => {
      const [m, d] = key.split('-').map(Number);
      const next = new Date(year, m - 1, d + 1);
      const nextKey = `${next.getMonth() + 1}-${next.getDate()}`;
      const afterNext = new Date(year, m - 1, d + 2);
      const afterNextKey = `${afterNext.getMonth() + 1}-${afterNext.getDate()}`;
      if (holidays[key] && holidays[afterNextKey] && !holidays[nextKey] && next.getDay() !== 0) {
        holidays[nextKey] = '国民の休日';
      }
    });

    // 振替休日
    const entries = Object.entries(holidays);
    entries.forEach(([key, name]) => {
      const [m, d] = key.split('-').map(Number);
      const dateObj = new Date(year, m - 1, d);
      if (dateObj.getDay() === 0) {
        let sub = new Date(year, m - 1, d + 1);
        while (holidays[`${sub.getMonth() + 1}-${sub.getDate()}`]) {
          sub = new Date(sub.getFullYear(), sub.getMonth(), sub.getDate() + 1);
        }
        holidays[`${sub.getMonth() + 1}-${sub.getDate()}`] = '振替休日';
      }
    });

    return holidays;
  }

  function getHolidayName(year, month, date) {
    // month は 0-indexed
    const holidays = getHolidays(year);
    return holidays[`${month + 1}-${date}`] || null;
  }

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function update() {
    const now = new Date();

    hoursEl.textContent = pad(now.getHours());
    minutesEl.textContent = pad(now.getMinutes());
    secondsEl.textContent = pad(now.getSeconds());
    colonEl.classList.toggle('dim', now.getSeconds() % 2 === 1);

    const year = now.getFullYear();
    const month = now.getMonth();
    const date = now.getDate();
    const weekday = now.getDay();

    dateTextEl.textContent = `${year}/${pad(month + 1)}/${pad(date)}`;
    weekdayTextEl.textContent = weekdayNames[weekday];

    const holidayName = getHolidayName(year, month, date);

    dateRowEl.classList.remove('sunday', 'saturday', 'holiday');
    if (holidayName) {
      dateRowEl.classList.add('holiday');
    } else if (weekday === 0) {
      dateRowEl.classList.add('sunday');
    } else if (weekday === 6) {
      dateRowEl.classList.add('saturday');
    }

    holidayNameEl.textContent = holidayName || '';
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
